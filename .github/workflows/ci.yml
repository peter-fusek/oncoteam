name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run ruff check
      - run: uv run ruff format --check

  tenant-isolation-grep:
    # #435 Item 6 — fail the build if any non-test call site passes
    # token=None without a `# tenant-exempt: <reason>` annotation. Prevents
    # accidental re-introduction of the silent admin-bearer fallback that
    # caused oncofiles#478. Patient-scoped callers must route through
    # get_token_for_patient(patient_id); system-scoped callers must document
    # why the untenanted scope is intentional.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run python scripts/check_tenant_exempt.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run pytest

  chaos-oncofiles-down:
    # #431 Step 7: prove the architectural invariant that oncoteam boots
    # + serves /health 200 even when oncofiles is completely unreachable.
    # Regression gate for the 2026-04-23 cascade — any PR that re-
    # introduces a startup-time await on oncofiles will fail here.
    # No untrusted input is interpolated into run: blocks, only literal
    # env vars set from this file.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Point at a black-hole URL. TEST-NET-1 (RFC5737 192.0.2.0/24) is
      # guaranteed unroutable so the TCP stack hangs until timeout —
      # exactly the pathological oncofiles-down case.
      ONCOFILES_MCP_URL: "http://192.0.2.1:9999/mcp"
      ONCOFILES_MCP_TOKEN: "chaos-drill-dummy-token"
      MCP_TRANSPORT: "streamable-http"
      MCP_HOST: "127.0.0.1"
      MCP_PORT: "9100"
      MCP_BEARER_TOKEN: "chaos-drill-dummy"
      DASHBOARD_API_KEY: "chaos-drill-dummy"
      DASHBOARD_ALLOWED_ORIGINS: "http://localhost"
      AUTONOMOUS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev

      - name: Boot oncoteam against unreachable oncofiles
        run: |
          # Start oncoteam in the background. It should bind the port
          # within a few seconds regardless of oncofiles being unreachable.
          uv run oncoteam-mcp &
          ONCOTEAM_PID=$!
          echo "Started oncoteam pid=$ONCOTEAM_PID"

          # Poll /health for up to 10 seconds. The invariant: oncoteam
          # MUST be responsive within this window even with oncofiles
          # black-holed. If it takes longer, Railway's healthcheck would
          # have given up and we'd be in the 2026-04-23 failure mode.
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 http://127.0.0.1:9100/health || true)
            if [ "$STATUS" = "200" ]; then
              ELAPSED=$(awk "BEGIN {print $i * 0.5}")
              echo "✓ /health returned 200 after ${ELAPSED}s"
              BODY=$(curl -s --max-time 2 http://127.0.0.1:9100/health)
              echo "Body: $BODY"
              STATUS_FIELD=$(echo "$BODY" | jq -r '.status // empty')
              if [ "$STATUS_FIELD" != "ok" ]; then
                echo "✗ /health status field not 'ok': $STATUS_FIELD"
                kill $ONCOTEAM_PID 2>/dev/null || true
                exit 1
              fi
              echo "✓ Invariant holds: oncoteam boots independently of oncofiles"
              kill $ONCOTEAM_PID 2>/dev/null || true
              exit 0
            fi
            sleep 0.5
          done

          echo "✗ oncoteam failed to serve /health 200 within 10 seconds while oncofiles unreachable"
          echo "This is the 2026-04-23 cascade regression. See docs/incidents/2026-04-23-oncofiles-cascade.md"
          kill $ONCOTEAM_PID 2>/dev/null || true
          exit 1

  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: dashboard
      - run: pnpm build
        working-directory: dashboard

  smoke-test:
    if: github.event_name == 'pull_request'
    needs: [lint, test, dashboard-build]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Wait for Railway PR deploy
        run: sleep 120

      - name: Check backend health
        run: |
          DEPLOY_URL="${{ vars.RAILWAY_PR_BACKEND_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "RAILWAY_PR_BACKEND_URL not set, skipping"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$DEPLOY_URL/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Backend health check failed after 5 attempts"
          exit 1

      - name: Validate backend API responses
        run: |
          DEPLOY_URL="${{ vars.RAILWAY_PR_BACKEND_URL }}"
          API_KEY="${{ secrets.DASHBOARD_API_KEY }}"
          if [ -z "$DEPLOY_URL" ] || [ -z "$API_KEY" ]; then
            echo "Missing RAILWAY_PR_BACKEND_URL or DASHBOARD_API_KEY, skipping"
            exit 0
          fi

          ERRORS=0

          # /api/status — check structure
          BODY=$(curl -sf -H "Authorization: Bearer $API_KEY" "$DEPLOY_URL/api/status" || true)
          STATUS=$(echo "$BODY" | jq -r '.status // empty' 2>/dev/null || true)
          TOOLS=$(echo "$BODY" | jq -r '.tools_count // 0' 2>/dev/null || true)
          if [ "$STATUS" = "ok" ] && [ "$TOOLS" -gt 0 ] 2>/dev/null; then
            echo "✓ /api/status: status=ok, tools=$TOOLS"
          else
            echo "✗ /api/status: unexpected response"
            echo "$BODY" | head -5
            ERRORS=$((ERRORS + 1))
          fi

          # /api/labs — check entries key
          BODY=$(curl -sf -H "Authorization: Bearer $API_KEY" "$DEPLOY_URL/api/labs" || true)
          HAS_ENTRIES=$(echo "$BODY" | jq 'has("entries")' 2>/dev/null || echo "false")
          if [ "$HAS_ENTRIES" = "true" ]; then
            echo "✓ /api/labs: has entries key"
          else
            echo "✗ /api/labs: missing entries key"
            ERRORS=$((ERRORS + 1))
          fi

          # /api/briefings — check briefings key
          BODY=$(curl -sf -H "Authorization: Bearer $API_KEY" "$DEPLOY_URL/api/briefings" || true)
          HAS_BRIEFINGS=$(echo "$BODY" | jq 'has("briefings")' 2>/dev/null || echo "false")
          if [ "$HAS_BRIEFINGS" = "true" ]; then
            echo "✓ /api/briefings: has briefings key"
          else
            echo "✗ /api/briefings: missing briefings key"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "API validation failed with $ERRORS errors"
            exit 1
          fi

      - name: Check dashboard
        run: |
          DEPLOY_URL="${{ vars.RAILWAY_PR_DASHBOARD_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "RAILWAY_PR_DASHBOARD_URL not set, skipping"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$DEPLOY_URL")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "Dashboard OK (status: $STATUS)"
          else
            echo "Dashboard returned $STATUS"
            exit 1
          fi

  post-deploy-check:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deploy
        run: sleep 120

      - name: Check backend health
        env:
          PROD_BACKEND_URL: https://api.oncoteam.cloud
        run: |
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s "$PROD_BACKEND_URL/health" || true)
            STATUS=$(echo "$RESPONSE" | jq -r '.status // empty' 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              VERSION=$(echo "$RESPONSE" | jq -r '.version // "unknown"' 2>/dev/null || true)
              echo "Backend healthy — version: $VERSION"
              exit 0
            fi
            echo "Attempt $i: not healthy yet, retrying in 30s..."
            sleep 30
          done
          echo "Backend health check failed after 5 attempts"
          exit 1

      - name: Validate production API responses
        env:
          PROD_BACKEND_URL: https://api.oncoteam.cloud
        run: |
          API_KEY="${{ secrets.PROD_DASHBOARD_API_KEY }}"
          if [ -z "$API_KEY" ]; then
            echo "PROD_DASHBOARD_API_KEY not set, skipping response validation"
            exit 0
          fi

          ERRORS=0

          BODY=$(curl -sf -H "Authorization: Bearer $API_KEY" "$PROD_BACKEND_URL/api/status" || true)
          STATUS=$(echo "$BODY" | jq -r '.status // empty' 2>/dev/null || true)
          TOOLS=$(echo "$BODY" | jq -r '.tools_count // 0' 2>/dev/null || true)
          if [ "$STATUS" = "ok" ] && [ "$TOOLS" -gt 0 ] 2>/dev/null; then
            echo "✓ /api/status: status=ok, tools=$TOOLS"
          else
            echo "✗ /api/status: unexpected response"
            ERRORS=$((ERRORS + 1))
          fi

          BODY=$(curl -sf -H "Authorization: Bearer $API_KEY" "$PROD_BACKEND_URL/api/labs" || true)
          HAS_ENTRIES=$(echo "$BODY" | jq 'has("entries")' 2>/dev/null || echo "false")
          if [ "$HAS_ENTRIES" = "true" ]; then
            echo "✓ /api/labs: has entries key"
          else
            echo "✗ /api/labs: missing entries key"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "Production API validation failed with $ERRORS errors"
            exit 1
          fi

      - name: Check dashboard
        env:
          PROD_DASHBOARD_URL: https://dashboard.oncoteam.cloud
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' -L "$PROD_DASHBOARD_URL")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Dashboard OK (status: $STATUS)"
              exit 0
            fi
            echo "Attempt $i: dashboard returned $STATUS, retrying in 30s..."
            sleep 30
          done
          echo "Dashboard health check failed after 3 attempts"
          exit 1

      - name: Post deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'deploy/production',
              description: state === 'success' ? 'Production deploy verified' : 'Production deploy check failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
